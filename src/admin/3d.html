<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SCOUT C2 — 3D Tactical View</title>
  <style>
    :root {
      --bg: #0A0E1A;
      --panel: #0F1629;
      --cyan: #00F0FF;
      --red: #FF3366;
      --yellow: #FFCC00;
      --green: #00FF88;
      --text: #E0E6F0;
      --muted: #6B7A9C;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: var(--bg); color: var(--text); font-family: Inter, system-ui, sans-serif; overflow: hidden; }
    #canvas { display: block; }
    .overlay { position: fixed; top: 16px; left: 16px; width: 300px; background: rgba(15, 22, 41, 0.92); border: 1px solid #1E2A4A; border-radius: 12px; padding: 16px; pointer-events: none; }
    .overlay h1 { font-size: 18px; margin: 0 0 8px; color: var(--cyan); }
    .row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 6px; }
    .label { color: var(--muted); }
    .value { font-weight: 700; }
    .alert { border-left: 3px solid var(--red); padding-left: 8px; margin-top: 8px; font-size: 12px; }
    .alert.change { border-color: var(--yellow); }
    .legend { position: fixed; bottom: 16px; left: 16px; background: rgba(15, 22, 41, 0.9); border: 1px solid #1E2A4A; border-radius: 8px; padding: 10px 14px; font-size: 12px; }
    .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .btn { position: fixed; bottom: 16px; right: 16px; background: var(--cyan); color: #000; border: none; border-radius: 8px; padding: 12px 18px; font-weight: 700; cursor: pointer; }
    .building-panel { position: fixed; top: 16px; right: 16px; width: 220px; max-height: 70vh; overflow-y: auto; background: rgba(15, 22, 41, 0.92); border: 1px solid #1E2A4A; border-radius: 12px; padding: 14px; }
    .building-panel h2 { font-size: 13px; color: var(--cyan); margin: 0 0 10px; letter-spacing: 1px; }
    .bldg-row { padding: 6px 8px; margin: 4px 0; border-radius: 4px; font-size: 11px; cursor: pointer; transition: all 0.2s; border-left: 3px solid; }
    .bldg-row:hover { opacity: 0.8; }
    .bldg-row.unknown { background: rgba(136,136,136,0.12); border-color: #888; }
    .bldg-row.in-progress { background: rgba(255,159,10,0.15); border-color: var(--yellow); }
    .bldg-row.cleared { background: rgba(50,215,75,0.12); border-color: var(--green); }
    .bldg-row.threat { background: rgba(255,69,58,0.15); border-color: var(--red); }
    #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--cyan); font-size: 20px; font-weight: 700; }
  </style>
</head>
<body>
  <div id="loading">LOADING VILLAGE MAP...</div>
  <div class="overlay">
    <h1>SCOUT C2 — 3D</h1>
    <div class="row"><span class="label">Mission Time</span><span class="value" id="time">--:--:--</span></div>
    <div class="row"><span class="label">Sector</span><span class="value" id="sector">Sector 7</span></div>
    <div class="row"><span class="label">Coverage</span><span class="value" id="cov">0%</span></div>
    <div class="row"><span class="label">Agents</span><span class="value" id="agents">5</span></div>
    <div class="row"><span class="label">Alerts</span><span class="value" id="alerts">0</span></div>
    <div id="alert-box"></div>
  </div>
  <div class="legend">
    <div class="legend-item"><span class="dot" style="background:#FF3366"></span>Threat</div>
    <div class="legend-item"><span class="dot" style="background:#FFCC00"></span>Change</div>
    <div class="legend-item"><span class="dot" style="background:#00FF88"></span>Coverage</div>
    <div class="legend-item"><span class="dot" style="background:#fff"></span>Agent</div>
  </div>
  <div class="building-panel" id="building-panel">
    <h2>▼ BUILDING STATUS</h2>
    <div id="building-list"></div>
  </div>
  <button class="btn" onclick="location.href='/admin'">2D ADMIN →</button>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>
  <script>
    // --- Scene setup ---
    const MAP_W = 1000, MAP_H = 800;
    const BUILDINGS = [
      {id: "B1", x: 80, y: 80, w: 90, h: 70},
      {id: "B2", x: 280, y: 120, w: 110, h: 80},
      {id: "B3", x: 480, y: 70, w: 100, h: 90},
      {id: "B4", x: 180, y: 320, w: 130, h: 100},
      {id: "B5", x: 440, y: 280, w: 90, h: 110},
      {id: "B6", x: 680, y: 180, w: 120, h: 90},
      {id: "B7", x: 130, y: 520, w: 110, h: 80},
      {id: "B8", x: 390, y: 470, w: 140, h: 100},
      {id: "B9", x: 640, y: 440, w: 100, h: 120},
      {id: "B10", x: 790, y: 590, w: 110, h: 90},
    ];
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x12182e);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 3000);
    camera.position.set(500, 700, 900);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.target.set(500, 0, 400);
    controls.enableDamping = true;
    controls.maxPolarAngle = Math.PI / 2 - 0.05;

    // --- Lights (brightened for daytime tactical look) ---
    const ambient = new THREE.AmbientLight(0x8090b0, 0.85);
    scene.add(ambient);

    const hemi = new THREE.HemisphereLight(0xaaccff, 0x12182e, 0.7);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 1.3);
    dir.position.set(400, 900, 300);
    dir.castShadow = true;
    dir.shadow.mapSize.width = 2048;
    dir.shadow.mapSize.height = 2048;
    scene.add(dir);

    const rim = new THREE.DirectionalLight(0x6699ff, 0.5);
    rim.position.set(-500, 200, -500);
    scene.add(rim);

    const fill = new THREE.DirectionalLight(0xffcc88, 0.45);
    fill.position.set(500, 100, -500);
    scene.add(fill);

    // Exponential fog for depth
    scene.fog = new THREE.FogExp2(0x12182e, 0.0008);

    // --- Ground / grid ---
    const groundGeo = new THREE.PlaneGeometry(1000, 800);
    const groundMat = new THREE.MeshStandardMaterial({ color: 0x0F1629, roughness: 0.9 });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    ground.position.set(500, 0, 400);
    ground.receiveShadow = true;
    scene.add(ground);

    const grid = new THREE.GridHelper(1000, 20, 0x1E2A4A, 0x1E2A4A);
    grid.position.set(500, 0.2, 400);
    grid.scale.z = 0.8;
    scene.add(grid);

    // --- Mesh buildings (readable transparent boxes + wireframe) ---
    const buildingColors = [0x8a9199, 0x7d858d, 0x9299a1, 0x848c94, 0x7a828a];
    const buildingMeshes = [];
    function createBuildings() {
      BUILDINGS.forEach((b, i) => {
        const height = getBuildingHeight(i);
        const cx = b.x + b.w / 2;
        const cz = b.y + b.h / 2;
        const color = buildingColors[i % buildingColors.length];

        // Transparent volume
        const geo = new THREE.BoxGeometry(b.w, height, b.h);
        const mat = new THREE.MeshStandardMaterial({
          color: color,
          transparent: true,
          opacity: 0.28,
          roughness: 0.9,
          metalness: 0.1,
          side: THREE.DoubleSide,
          depthWrite: false
        });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.position.set(cx, height / 2, cz);
        mesh.castShadow = false;
        mesh.receiveShadow = false;
        scene.add(mesh);

        // Wireframe edges
        const edges = new THREE.EdgesGeometry(geo);
        const lineMat = new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.7 });
        const wire = new THREE.LineSegments(edges, lineMat);
        wire.position.copy(mesh.position);
        scene.add(wire);

        // Flat roof (slightly overhanging, solid)
        const roofGeo = new THREE.BoxGeometry(b.w + 4, 1.5, b.h + 4);
        const roofMat = new THREE.MeshStandardMaterial({ color: 0x5a5f66, roughness: 0.9 });
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.set(cx, height + 0.75, cz);
        roof.castShadow = true;
        roof.receiveShadow = true;
        scene.add(roof);

        // Building label sprite
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, 64, 32);
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 16px Inter';
        ctx.textAlign = 'center';
        ctx.fillText(b.id, 32, 21);
        const tex = new THREE.CanvasTexture(canvas);
        const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.85 }));
        sprite.position.set(cx, height + 8, cz);
        sprite.scale.set(24, 12, 1);
        scene.add(sprite);

        buildingMeshes.push({ id: b.id, mesh, wire, roof, baseColor: color, height });
      });
    }
    createBuildings();

    // --- State ---
    let state = null;
    const agentMeshes = {};
    const fovMeshes = {};
    const alertMarkers = [];
    const coverageGroup = new THREE.Group();
    scene.add(coverageGroup);
    const coveragePoints = [];

    // --- Helpers ---
    function createAgent(a) {
      const group = new THREE.Group();
      const color = new THREE.Color(a.color);

      // Robot body (glowing box)
      const body = new THREE.Mesh(
        new THREE.BoxGeometry(6, 4, 8),
        new THREE.MeshStandardMaterial({ color: color, emissive: color, emissiveIntensity: 0.5 })
      );
      body.position.y = 3;
      body.castShadow = true;
      group.add(body);

      // 4 legs
      const legMat = new THREE.MeshStandardMaterial({ color: 0x666666 });
      const legGeo = new THREE.BoxGeometry(1, 3, 1);
      const legPositions = [[-2.5, 1.5, -3.5], [2.5, 1.5, -3.5], [-2.5, 1.5, 3.5], [2.5, 1.5, 3.5]];
      legPositions.forEach(pos => {
        const leg = new THREE.Mesh(legGeo, legMat);
        leg.position.set(...pos);
        group.add(leg);
      });

      // Direction arrow / antenna
      const arrow = new THREE.Mesh(
        new THREE.ConeGeometry(2.5, 8, 16),
        new THREE.MeshBasicMaterial({ color: 0xffffff })
      );
      arrow.geometry.rotateX(Math.PI / 2);
      arrow.position.set(0, 3, 10);
      group.add(arrow);

      // Glowing ring on ground
      const ring = new THREE.Mesh(
        new THREE.RingGeometry(8, 10, 32),
        new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0.4, side: THREE.DoubleSide })
      );
      ring.rotation.x = -Math.PI / 2;
      ring.position.y = 0.2;
      ring.name = 'ring';
      group.add(ring);

      // Label
      const canvas = document.createElement('canvas');
      canvas.width = 128; canvas.height = 32;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Inter'; ctx.textAlign = 'center';
      ctx.fillText(a.id + ' ' + a.name, 64, 22);
      const tex = new THREE.CanvasTexture(canvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
      sprite.position.set(0, 16, 0);
      sprite.scale.set(50, 12, 1);
      group.add(sprite);

      scene.add(group);
      agentMeshes[a.id] = group;

      const fovGeo = new THREE.ConeGeometry(70, 90, 32, 1, true);
      fovGeo.rotateX(-Math.PI / 2);
      fovGeo.translate(0, 0, 45);
      const fovMat = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.15,
        side: THREE.DoubleSide,
        depthWrite: false
      });
      const fov = new THREE.Mesh(fovGeo, fovMat);
      scene.add(fov);
      fovMeshes[a.id] = fov;
    }

    function updateAgent(a, time) {
      const pos = a.position;
      const x = pos.x, z = pos.y;
      const group = agentMeshes[a.id];
      group.position.set(x, 0, z);
      group.rotation.y = -THREE.MathUtils.degToRad(pos.angle);

      // Pulse ring
      const ring = group.getObjectByName('ring');
      if (ring) {
        const s = 1 + Math.sin(time * 4 + a.id) * 0.15;
        ring.scale.setScalar(s);
      }

      const fov = fovMeshes[a.id];
      fov.position.set(x, 12, z);
      fov.rotation.y = -THREE.MathUtils.degToRad(pos.angle);

      if (a.status === 'THREAT') {
        const alertRing = new THREE.Mesh(
          new THREE.RingGeometry(10, 12, 32),
          new THREE.MeshBasicMaterial({ color: 0xFF3366, side: THREE.DoubleSide, transparent: true, opacity: 0.8 })
        );
        alertRing.rotation.x = -Math.PI / 2;
        alertRing.position.set(x, 0.5, z);
        scene.add(alertRing);
        alertMarkers.push(alertRing);
      }
    }

    function addCoveragePoint(x, y) {
      coveragePoints.push({ x, y });
      if (coveragePoints.length > 300) coveragePoints.shift();
      const geo = new THREE.CircleGeometry(32, 24);
      const mat = new THREE.MeshBasicMaterial({ color: 0x00FF88, transparent: true, opacity: 0.15, side: THREE.DoubleSide, depthWrite: false });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.rotation.x = -Math.PI / 2;
      mesh.position.set(x, 0.3, y);
      coverageGroup.add(mesh);
    }

    function clearAlertMarkers() {
      alertMarkers.forEach(m => scene.remove(m));
      alertMarkers.length = 0;
    }

    function getBuildingHeight(idx) {
      return 32 + ((idx * 7) % 18);
    }

    function renderAlerts() {
      if (!state) return;
      clearAlertMarkers();
      state.alerts.forEach(al => {
        const b = state.buildings.find(bb => al.location.includes(bb.id));
        if (!b) return;
        const bIdx = BUILDINGS.findIndex(bb => bb.id === b.id);
        const height = bIdx >= 0 ? getBuildingHeight(bIdx) : 35;
        const color = al.type === 'THREAT' ? 0xFF3366 : 0xFFCC00;
        const marker = new THREE.Mesh(
          new THREE.ConeGeometry(10, 25, 16),
          new THREE.MeshBasicMaterial({ color })
        );
        marker.position.set(b.x + b.w / 2, height + 18, b.y + b.h / 2);
        scene.add(marker);
        alertMarkers.push(marker);
      });
    }

    // --- Building status panel ---
    const buildingStates = {};
    BUILDINGS.forEach(b => buildingStates[b.id] = 'unknown');
    const stateColors = {
      unknown: 0x888888,
      'in-progress': 0xFFCC00,
      cleared: 0x00FF88,
      threat: 0xFF3366,
      change: 0xFFCC00
    };

    function initBuildingPanel() {
      const list = document.getElementById('building-list');
      list.innerHTML = '';
      BUILDINGS.forEach((b, i) => {
        const div = document.createElement('div');
        div.className = 'bldg-row unknown';
        div.dataset.id = b.id;
        div.textContent = b.id + ' — Unknown';
        div.onclick = () => {
          const states = ['unknown', 'in-progress', 'cleared', 'threat'];
          const next = states[(states.indexOf(buildingStates[b.id]) + 1) % states.length];
          setBuildingState(b.id, next);
        };
        list.appendChild(div);
      });
    }

    function setBuildingState(id, st) {
      buildingStates[id] = st;
      const row = document.querySelector(`.bldg-row[data-id="${id}"]`);
      if (row) {
        row.className = 'bldg-row ' + st;
        row.textContent = id + ' — ' + st.replace('-', ' ').toUpperCase();
      }
      const bIdx = BUILDINGS.findIndex(bb => bb.id === id);
      if (bIdx >= 0) {
        const bm = buildingMeshes[bIdx];
        const c = stateColors[st];
        bm.mesh.material.color.setHex(c);
        bm.wire.material.color.setHex(c);
      }
    }

    function updateBuildingStatesFromState() {
      if (!state) return;
      // Reset non-alert states to unknown, keep alerts
      BUILDINGS.forEach(b => {
        if (buildingStates[b.id] !== 'threat' && buildingStates[b.id] !== 'change') {
          buildingStates[b.id] = 'unknown';
        }
      });
      // Mark buildings with nearby agents as in-progress
      state.agents.forEach(a => {
        const px = a.position.x, py = a.position.y;
        BUILDINGS.forEach(b => {
          if (px >= b.x - 30 && px <= b.x + b.w + 30 && py >= b.y - 30 && py <= b.y + b.h + 30) {
            if (buildingStates[b.id] !== 'threat' && buildingStates[b.id] !== 'change') {
              buildingStates[b.id] = 'in-progress';
            }
          }
        });
      });
      // Alerts
      state.alerts.forEach(al => {
        const b = state.buildings.find(bb => al.location.includes(bb.id));
        if (b) buildingStates[b.id] = al.type === 'THREAT' ? 'threat' : 'change';
      });
      // Apply
      BUILDINGS.forEach(b => setBuildingState(b.id, buildingStates[b.id]));
    }

    initBuildingPanel();

    // --- Load procedural village point cloud ---
    const loader = new THREE.PLYLoader();
    loader.load('/village.ply', function (geometry) {
      geometry.computeBoundingBox();
      const box = geometry.boundingBox;
      const size = new THREE.Vector3();
      box.getSize(size);
      const center = new THREE.Vector3();
      box.getCenter(center);

      // Village PLY is already Y-up and matches simulator coordinates:
      // x = simulator x, y = height, z = simulator y.
      // Map bounds are 1000 x 800, so it fits naturally over the ground plane.
      const material = new THREE.PointsMaterial({
        size: 3.5,
        vertexColors: true,
        opacity: 0.9,
        transparent: true,
        sizeAttenuation: true
      });
      const points = new THREE.Points(geometry, material);
      scene.add(points);

      // Aim camera at the village center.
      const worldCenter = new THREE.Vector3(MAP_W / 2, 0, MAP_H / 2);
      controls.target.copy(worldCenter);
      camera.position.set(worldCenter.x + 350, worldCenter.y + 650, worldCenter.z + 750);
      controls.update();

      document.getElementById('loading').style.display = 'none';
    }, undefined, function (err) {
      console.error(err);
      document.getElementById('loading').textContent = 'FAILED TO LOAD VILLAGE MAP';
    });

    // --- Loop ---
    let simTime = 0;
    async function poll() {
      try {
        const r = await fetch('/api/state');
        const s = await r.json();
        state = s;

        s.agents.forEach(a => {
          if (!agentMeshes[a.id]) createAgent(a);
          updateAgent(a, simTime);
          addCoveragePoint(a.position.x, a.position.y);
        });

        renderAlerts();
        updateBuildingStatesFromState();

        document.getElementById('time').textContent = s.mission_time;
        document.getElementById('cov').textContent = s.coverage_pct + '%';
        document.getElementById('agents').textContent = s.agents.length;
        document.getElementById('alerts').textContent = s.alerts.length;

        const box = document.getElementById('alert-box');
        box.innerHTML = '';
        s.alerts.slice(0, 2).forEach(al => {
          const d = document.createElement('div');
          d.className = 'alert' + (al.type === 'CHANGE' ? ' change' : '');
          d.textContent = `${al.type} — ${al.agent} @ ${al.location}`;
          box.appendChild(d);
        });
      } catch (e) { console.error(e); }
    }

    function animate() {
      requestAnimationFrame(animate);
      simTime += 0.016;
      controls.update();
      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    setInterval(poll, 500);
    poll();
    animate();
  </script>
</body>
</html>
